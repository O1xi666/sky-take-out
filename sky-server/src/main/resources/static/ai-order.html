<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 智能点餐 - 苍穹外卖</title>
    <style>
        :root {
            --primary-color: #ff6b01; /* 饿了么/美团橙 */
            --secondary-color: #ffc107;
            --bg-color: #f5f5f5;
            --card-bg: #ffffff;
            --text-main: #333;
            --text-sub: #666;
            --success: #52c41a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; }

        body { background-color: var(--bg-color); color: var(--text-main); padding-bottom: 80px; }

        /* 顶部导航 */
        .header {
            background: linear-gradient(135deg, #ff9000, #ff6b01);
            color: white;
            padding: 20px;
            text-align: center;
            box-shadow: 0 2px 10px rgba(255, 107, 1, 0.3);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header h1 { font-size: 1.5rem; margin-bottom: 5px; }
        .header p { font-size: 0.9rem; opacity: 0.9; }

        /* AI 推荐区 */
        .ai-section {
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        .ai-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 15px rgba(118, 75, 162, 0.4);
            margin-bottom: 20px;
        }
        .ai-text h3 { font-size: 1.2rem; margin-bottom: 8px; }
        .ai-text p { font-size: 0.9rem; opacity: 0.9; }
        .ai-btn {
            background: white;
            color: #764ba2;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .ai-btn:hover { transform: scale(1.05); }

        /* 筛选标签 */
        .filters {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 0 20px 15px;
            max-width: 800px;
            margin: 0 auto;
            scrollbar-width: none; /* Firefox */
        }
        .filters::-webkit-scrollbar { display: none; } /* Chrome */

        .filter-tag {
            background: white;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.9rem;
            color: var(--text-sub);
            border: 1px solid #ddd;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.3s;
        }
        .filter-tag.active {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        /* 菜品列表 */
        .dish-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 15px;
            padding: 0 20px;
            max-width: 800px;
            margin: 0 auto;
        }

        .dish-card {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            transition: transform 0.3s, box-shadow 0.3s;
            display: flex;
            flex-direction: row; /* 横向布局 */
            height: 140px;
        }
        .dish-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .dish-img {
            width: 140px;
            height: 100%;
            object-fit: cover;
            background-color: #eee;
        }

        .dish-info {
            flex: 1;
            padding: 12px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .dish-name { font-size: 1rem; font-weight: bold; color: var(--text-main); margin-bottom: 4px; }
        .dish-desc { font-size: 0.8rem; color: var(--text-sub); margin-bottom: 8px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        .dish-meta { display: flex; justify-content: space-between; align-items: center; }
        .dish-price { color: #ff4d4f; font-size: 1.1rem; font-weight: bold; }
        .dish-price::before { content: '¥'; font-size: 0.8rem; margin-right: 2px; }

        .tags { display: flex; gap: 4px; margin-bottom: 6px; }
        .tag { font-size: 0.7rem; padding: 2px 6px; border-radius: 4px; }
        .tag-spicy { background: #fff1f0; color: #ff4d4f; border: 1px solid #ffa39e; }
        .tag-light { background: #f6ffed; color: #52c41a; border: 1px solid #b7eb8f; }
        .tag-sweet { background: #fff7e6; color: #fa8c16; border: 1px solid #ffd591; }

        .add-btn {
            background: var(--primary-color);
            color: white;
            border: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            font-size: 1.2rem;
            line-height: 1;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }
        .add-btn:hover { background: #e65a00; }

        /* 底部购物车栏 */
        .cart-bar {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 760px;
            background: #333;
            color: white;
            padding: 15px 20px;
            border-radius: 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
            z-index: 1000;
            display: none; /* 默认隐藏，有商品时显示 */
        }
        .cart-info { display: flex; flex-direction: column; }
        .cart-total { font-size: 1.2rem; font-weight: bold; }
        .cart-count { font-size: 0.8rem; opacity: 0.8; }
        .checkout-btn {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
        }

        /* 占位图样式 */
        .placeholder-img {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f0f0f0;
            color: #ccc;
            font-size: 2rem;
        }
    </style>
</head>
<body>

<!-- 头部 -->
<div class="header">
    <h1>🤖 AI 智能点餐</h1>
    <p>告诉我想吃什么，我为您推荐最佳搭配</p>
</div>

<!-- AI 推荐区 -->
<div class="ai-section">
    <div class="ai-card">
        <div class="ai-text">
            <h3>今日特推：麻辣过瘾套餐</h3>
            <p>根据您的历史口味，为您推荐水煮鱼 + 麻婆豆腐</p>
        </div>
        <button class="ai-btn" onclick="alert('已为您一键加入购物车！')">一键加购</button>
    </div>
</div>

<!-- 筛选标签 -->
<div class="filters" id="filterContainer">
    <div class="filter-tag active" data-filter="all">全部</div>
    <div class="filter-tag" data-filter="辣">🌶️ 无辣不欢</div>
    <div class="filter-tag" data-filter="清淡">🥗 健康低脂</div>
    <div class="filter-tag" data-filter="甜咸">🍖 经典硬菜</div>
    <div class="filter-tag" data-filter="微甜">🍅 家常美味</div>
</div>

<!-- 菜品列表 -->
<div class="dish-list" id="dishList">
    <!-- 菜品将通过 JS 动态插入 -->
</div>

<!-- 底部购物车 -->
<div class="cart-bar" id="cartBar">
    <div class="cart-info">
        <span class="cart-total" id="totalPrice">¥0.00</span>
        <span class="cart-count" id="totalCount">共 0 件商品</span>
    </div>
    <button class="checkout-btn" onclick="alert('跳转至结算页面...')">去结算</button>
</div>

<script>
    // 模拟数据库数据 (实际项目中这里会调用后端 API)
    const dishes = [
        { id: 1, name: '宫保鸡丁', price: 28.00, flavor: '辣', category: '热销', desc: '经典川菜，鸡肉滑嫩', img: '🍗' },
        { id: 2, name: '麻婆豆腐', price: 18.00, flavor: '辣', category: '实惠', desc: '麻辣鲜香，超级下饭', img: '🍲' },
        { id: 3, name: '清炒时蔬', price: 15.00, flavor: '清淡', category: '健康', desc: '新鲜时蔬，低脂健康', img: '🥬' },
        { id: 4, name: '水煮鱼', price: 68.00, flavor: '特辣', category: '招牌', desc: '鱼肉滑嫩，麻辣过瘾', img: '🐟' },
        { id: 5, name: '番茄鸡蛋盖饭', price: 22.00, flavor: '微甜', category: '家常', desc: '酸甜可口，快速出餐', img: '🍅' },
        { id: 6, name: '红烧肉', price: 35.00, flavor: '甜咸', category: '经典', desc: '肥而不腻，入口即化', img: '🥩' }
    ];

    let cart = {}; // 购物车 { id: count }

    // 初始化渲染
    function renderDishes(filter = 'all') {
        const container = document.getElementById('dishList');
        container.innerHTML = '';

        const filteredDishes = filter === 'all'
            ? dishes
            : dishes.filter(d => d.flavor.includes(filter) || (filter === '甜咸' && d.flavor === '甜咸'));

        if (filteredDishes.length === 0) {
            container.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 40px; color: #999;">暂无相关菜品</div>';
            return;
        }

        filteredDishes.forEach(dish => {
            let tagClass = 'tag-light';
            if (dish.flavor.includes('辣')) tagClass = 'tag-spicy';
            else if (dish.flavor.includes('甜')) tagClass = 'tag-sweet';

            const card = document.createElement('div');
            card.className = 'dish-card';
            card.innerHTML = `
                <div class="dish-img">
                    <div class="placeholder-img">${dish.img}</div>
                </div>
                <div class="dish-info">
                    <div>
                        <div class="dish-name">${dish.name}</div>
                        <div class="tags">
                            <span class="tag ${tagClass}">${dish.flavor}</span>
                            <span class="tag" style="background:#f5f5f5; color:#666">${dish.category}</span>
                        </div>
                        <div class="dish-desc">${dish.desc}</div>
                    </div>
                    <div class="dish-meta">
                        <div class="dish-price">${dish.price.toFixed(2)}</div>
                        <button class="add-btn" onclick="addToCart(${dish.id})">+</button>
                    </div>
                </div>
            `;
            container.appendChild(card);
        });
    }

    // 添加到购物车
    function addToCart(id) {
        if (!cart[id]) cart[id] = 0;
        cart[id]++;
        updateCartUI();

        // 简单的动画反馈
        const btn = event.target;
        btn.style.transform = 'scale(1.2)';
        setTimeout(() => btn.style.transform = 'scale(1)', 200);
    }

    // 更新购物车 UI
    function updateCartUI() {
        let totalQty = 0;
        let totalPrice = 0;

        for (const [id, count] of Object.entries(cart)) {
            if (count > 0) {
                const dish = dishes.find(d => d.id == id);
                if (dish) {
                    totalQty += count;
                    totalPrice += dish.price * count;
                }
            }
        }

        const cartBar = document.getElementById('cartBar');
        const totalEl = document.getElementById('totalPrice');
        const countEl = document.getElementById('totalCount');

        if (totalQty > 0) {
            cartBar.style.display = 'flex';
            totalEl.textContent = `¥${totalPrice.toFixed(2)}`;
            countEl.textContent = `共 ${totalQty} 件商品`;
        } else {
            cartBar.style.display = 'none';
        }
    }

    // 筛选事件绑定
    document.querySelectorAll('.filter-tag').forEach(tag => {
        tag.addEventListener('click', function() {
            document.querySelectorAll('.filter-tag').forEach(t => t.classList.remove('active'));
            this.classList.add('active');
            renderDishes(this.dataset.filter);
        });
    });

    // 初始加载
    renderDishes();
</script>
</body>
</html>
